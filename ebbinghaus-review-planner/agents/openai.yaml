  short_description: "先教会再复习，生成一致的A4 Word与PDF手册"
  icon: "🧠"
  primary_color: "#4F46E5"
  default_prompt: "Use $ebbinghaus-review-planner only when the user explicitly wants to learn, memorize, review, prepare for an exam, train on, or internalize material. When the user says they know nothing or are a complete beginner, teach before testing with plain-language explanations, examples, non-examples, guided practice, independent practice, and transfer. Build a complete scope map with no unexplained gaps, map A/B knowledge points to questions, merge all same-day work into one budget-safe daily task, calculate adaptive next dates, and create one audited A4 DOCX master, convert the final PDF from that same DOCX, prevent blank pages and broken words, keep body text printable, and verify the DOCX/PDF pair."
policy:
  allow_implicit_invocation: true
